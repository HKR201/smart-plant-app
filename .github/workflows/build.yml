name: Manual Flutter APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ကိုယ့်ရဲ့ Code တွေကို စက်ရုံထဲ ဆွဲယူခြင်း
        uses: actions/checkout@v4

      - name: Android အတွက် Java ထည့်သွင်းခြင်း
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter နည်းပညာ ထည့်သွင်းခြင်း
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Android အခွံများကို အလိုအလျောက် ဖန်တီးခြင်း (Smart Trick)
        run: |
          mkdir -p temp_backup
          cp lib/main.dart temp_backup/main.dart
          cp pubspec.yaml temp_backup/pubspec.yaml
          flutter create --platforms android --project-name smart_plant_app .
          cp temp_backup/main.dart lib/main.dart
          cp temp_backup/pubspec.yaml pubspec.yaml

      - name: လိုအပ်တဲ့ ဖိုင်တွေ ဒေါင်းလုဒ်ဆွဲခြင်း
        run: flutter pub get

      - name: APK ဖိုင် အဖြစ် ပြောင်းလဲထုတ်လုပ်ခြင်း
        run: flutter build apk --release

      - name: ထွက်လာတဲ့ APK ကို ဒေါင်းလုဒ်ဆွဲလို့ရအောင် တင်ပေးခြင်း
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Plant-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          
