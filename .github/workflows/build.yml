name: Manual Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reconstruct Android Project & Add Permissions
        run: |
          # Android Project ကို အလိုအလျောက် ဆောက်မယ်
          flutter create . --platforms android --org com.smartplant.app
          
          # အင်တာနက် သုံးခွင့် (Internet Permission) ကို AndroidManifest.xml ထဲကို အလိုအလျောက် ထည့်ပေးမယ့် စက်ရုပ် အမိန့်
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Get Dependencies
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons:main
          
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-plant-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
