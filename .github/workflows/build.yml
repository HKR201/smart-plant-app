name: Manual Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # --- ဒီအဆင့်က အဓိကပါ ---
      - name: Reconstruct Android Project
        run: |
          flutter create . --platforms android --org com.smartplant.app
          # ရှိပြီးသား ဖိုင်တွေ မပျက်အောင် platform ဆောက်ခိုင်းလိုက်တာပါ

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-plant-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
